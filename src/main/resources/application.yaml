spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/projeto_fiscal
    username: fiscal
    password: fiscal
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/projeto-fiscal}

server:
  port: 8080

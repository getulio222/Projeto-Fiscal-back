services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: projeto_fiscal
      POSTGRES_USER: fiscal
      POSTGRES_PASSWORD: fiscal
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    command: start-dev --import-realm --http-port=8180
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    ports:
      - "8180:8180"
    volumes:
      - ./infra/keycloak/realm-projeto-fiscal.json:/opt/keycloak/data/import/realm-projeto-fiscal.json:ro
      - ./infra/keycloak/themes/projeto-fiscal:/opt/keycloak/themes/projeto-fiscal:ro

  keycloak-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  keycloak-postgres-data:
